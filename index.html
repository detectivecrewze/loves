    <script>
        function initializeValentineApp() {
            const DATA = window.VALENTINE_DATA || {};
            const songs = DATA.music || [];

            // ── AUDIO Initialization ─────────────────────────────────
            // Add Audio for printer
            const printerSfx = new Audio();
            printerSfx.src = 'assets/sfx1.dat'; 
            printerSfx.loop = true;

            const scratchSfx = new Audio();
            scratchSfx.src = 'assets/scratching.dat';
            scratchSfx.loop = true;

            // Global iOS Audio Priming (Unlock on FIRST touch/click anywhere)
            // This is the most reliable way to unlock standard HTMLAudioElements on iOS Safari
            const _unlockGlobalAudio = () => {
                const prime = (a) => {
                    if (!a) return;
                    a.muted = true;
                    a.play().then(() => {
                        a.pause();
                        a.currentTime = 0;
                        a.muted = false;
                    }).catch(() => {
                        a.muted = false;
                    });
                };
                prime(printerSfx);
                prime(scratchSfx);
                prime(audio);
                document.removeEventListener('touchstart', _unlockGlobalAudio);
                document.removeEventListener('click', _unlockGlobalAudio);
            };
            document.addEventListener('touchstart', _unlockGlobalAudio, { once: true });
            document.addEventListener('click', _unlockGlobalAudio, { once: true });

            // ── Theme ────────────────────────────────────────────────
            // ── Init Login ───────────────────────────────────────────
            (function initLogin() {
                if (!document.getElementById('page-login')) return;
                const loginCfg = DATA.login || {};
                const type = DATA.theme?.particles || 'hearts';

                document.getElementById('login-title').textContent = loginCfg.title || 'Key to My Heart';
                const hintEl = document.getElementById('login-hint');
                if (hintEl && loginCfg.instruction && loginCfg.instruction.trim() !== '' && loginCfg.instruction !== 'Masukkan kata sandimu') {
                    hintEl.textContent = 'Hint: ' + loginCfg.instruction;
                    hintEl.style.display = 'block';
                }
                document.getElementById('login-input').placeholder = loginCfg.placeholder || '*kunci rahasia...*';

                // Floating particles
                if (type && type !== 'none') {
                    const container = document.getElementById('particles');
                    const emojis = type === 'hearts' ? ['❤️', '💕', '💗', '🌸'] : ['✨', '⭐', '🌟'];
                    for (let i = 0; i < 16; i++) {
                        const p = document.createElement('div');
                        p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                        p.style.cssText = `
                        position:absolute;
                        font-size:${Math.random() * 12 + 8}px;
                        left:${Math.random() * 100}%;
                        top:${Math.random() * 100}%;
                        opacity:0.25;
                        animation:float-particle ${Math.random() * 8 + 7}s ease-in-out ${Math.random() * 5}s infinite;
                        pointer-events:none;
                    `;
                        container.appendChild(p);
                    }
                }

                // Collection Text
                if (loginCfg.collectionText) {
                    const titleNode = document.getElementById('login-title');
                    if (titleNode) {
                        const ct = document.createElement('p');
                        ct.textContent = loginCfg.collectionText.toUpperCase();
                        ct.style.cssText = "font-size: 0.75rem; letter-spacing: 0.15em; font-family: var(--font-sans); margin-bottom: 0.5rem; opacity: 0.8;";
                        titleNode.parentNode.insertBefore(ct, titleNode);
                    }
                }

                const input = document.getElementById('login-input');
                const btn = document.getElementById('login-btn');
                const errMsg = document.getElementById('login-error-msg');
                const lockIcon = document.getElementById('lock-icon');

                input.addEventListener('keydown', (e) => { if (e.key === 'Enter') tryLogin(); });
                input.addEventListener('input', () => {
                    errMsg.classList.remove('visible');
                    lockIcon.textContent = input.value ? 'lock' : 'lock_open';
                });
                btn.addEventListener('click', tryLogin);

                function tryLogin() {
                    const val = input.value.trim();
                    const correct = loginCfg.password || '123';
                    if (val === correct) {
                        // Audio handles are globally primed via touchstart/click event.
                        // Music starts after the navigateTo delay.
                        if (audio) {
                            audio.play().catch(() => {});
                        }

                        lockIcon.textContent = 'lock_open';
                        lockIcon.style.color = 'var(--primary)';
                        btn.innerHTML = '<span class="material-symbols-outlined" style="font-weight: 800; font-size:1.6rem; color:white">check</span>';
                        btn.style.background = 'var(--primary)';
                        btn.style.boxShadow = '0 0 35px rgba(126, 12, 35, 0.45)';
                        btn.style.transform = 'scale(1.2)';
                        btn.style.transition = 'all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                        setTimeout(() => navigateTo('music'), 800);
                    } else {
                        errMsg.textContent = loginCfg.errorMessage || 'Password salah, coba lagi!';
                        errMsg.classList.add('visible');
                        input.classList.add('shake');
                        lockIcon.textContent = 'lock_open';
                        setTimeout(() => input.classList.remove('shake'), 450);
                    }
                }
            })();

            if (DATA.theme?.backgroundColor) {
                document.body.style.backgroundColor = DATA.theme.backgroundColor;
            }

            // ── SPA Navigation ───────────────────────────────────────
            const pages = ['login', 'music', 'gallery', 'wrapped', 'surat', 'invitation'];

            window.navigateTo = function (pageId) {
                let currentIndex = -1;
                for (let i = 0; i < pages.length; i++) {
                    const el = document.getElementById('page-' + pages[i]);
                    if (el && el.classList.contains('active')) {
                        currentIndex = i;
                        break;
                    }
                }

                let targetIndex = pages.indexOf(pageId);
                if (targetIndex !== -1) {
                    const direction = (currentIndex !== -1 && targetIndex < currentIndex) ? -1 : 1;
                    while (targetIndex >= 0 && targetIndex < pages.length) {
                        if (document.getElementById('page-' + pages[targetIndex])) {
                            pageId = pages[targetIndex];
                            break;
                        }
                        targetIndex += direction;
                    }
                }

                pages.forEach(id => {
                    const el = document.getElementById('page-' + id);
                    if (el) el.classList.toggle('active', id === pageId);
                });
                // Hide login decorations when not on login page
                const onLogin = pageId === 'login';
                const blur1 = document.getElementById('blur-deco-1');
                const blur2 = document.getElementById('blur-deco-2');
                const parts = document.getElementById('particles');
                if (blur1) blur1.style.display = onLogin ? '' : 'none';
                if (blur2) blur2.style.display = onLogin ? '' : 'none';
                if (parts) parts.style.display = onLogin ? '' : 'none';

                // Trigger wrapped printing effect if navigating there
                if (pageId === 'wrapped') {
                    // ── Populate wrapped data from data.js ─────────────
                    const wd = DATA.wrapped;
                    if (wd) {
                        const imgEl = document.getElementById('wrapped-image');
                        if (imgEl) imgEl.src = wd.imageSrc || '';

                        const plEl = document.getElementById('top-places-label');
                        if (plEl && wd.topPlacesLabel) plEl.textContent = wd.topPlacesLabel;
                        const plList = document.getElementById('top-places-list');
                        if (plList && wd.topPlaces) plList.innerHTML = wd.topPlaces.map(p => `<li>${p}</li>`).join('');

                        const cmEl = document.getElementById('core-memories-label');
                        if (cmEl && wd.coreMemoriesLabel) cmEl.textContent = wd.coreMemoriesLabel;
                        const cmList = document.getElementById('core-memories-list');
                        if (cmList && wd.coreMemories) cmList.innerHTML = wd.coreMemories.map(m => `<li>${m}</li>`).join('');

                        const minLbl = document.getElementById('minutes-together-label');
                        if (minLbl && wd.HoursTogetherLabel) minLbl.textContent = wd.HoursTogetherLabel;
                        const minEl = document.getElementById('minutes-together');
                        if (minEl) {
                            minEl.textContent = '0';
                            let target = 525600;
                            const hoursValStr = wd.HoursTogether || '525600';
                            // Jika dalam format YYYY-MM-DD, hitung beda waktu dalam menit
                            if (hoursValStr.match(/^\d{4}-\d{2}-\d{2}$/)) {
                                const startDate = new Date(hoursValStr);
                                const now = new Date();
                                const diffMs = now - startDate;
                                target = diffMs > 0 ? Math.floor(diffMs / (1000 * 60)) : 0;
                            } else {
                                const targetStr = hoursValStr.replace(/,/g, '');
                                target = parseInt(targetStr, 10) || 525600;
                            }

                            let cur = 0;
                            const step = target / 60;
                            const ticker = setInterval(() => {
                                cur = Math.min(cur + step, target);
                                minEl.textContent = Math.floor(cur).toLocaleString();
                                if (cur >= target) clearInterval(ticker);
                            }, 40);
                        }

                        const vibeLbl = document.getElementById('vibe-label');
                        if (vibeLbl && wd.vibeLabel) vibeLbl.textContent = wd.vibeLabel;
                        const vibeEl = document.getElementById('vibe-text');
                        if (vibeEl && wd.vibe) vibeEl.textContent = wd.vibe;
                    }

                    // ── Trigger printer animation ──────────────────────
                    const printerComp = document.getElementById('printer-comp');
                    const printerDevice = document.getElementById('printer-device');
                    const printerLed = document.getElementById('printer-led');

                    if (printerComp) {
                        printerComp.classList.remove('is-printing');
                        if (printerDevice) printerDevice.classList.remove('printer-vibrating');
                        if (printerLed) { printerLed.classList.remove('led-printing'); printerLed.classList.add('led-pulse'); }

                        // MUST play outside setTimeout to satisfy mobile Safari user-gesture requirements
                        if (printerSfx) {
                            printerSfx.currentTime = 0;
                            printerSfx.volume = 0.6;
                            const playPromise = printerSfx.play();
                            if (playPromise !== undefined) playPromise.catch((e) => { });
                        }

                        setTimeout(() => {
                            printerComp.classList.add('is-printing');
                            if (printerDevice) printerDevice.classList.add('printer-vibrating');
                            if (printerLed) { printerLed.classList.remove('led-pulse'); printerLed.classList.add('led-printing'); }

                            setTimeout(() => {
                                if (printerSfx) printerSfx.pause();
                                if (printerDevice) printerDevice.classList.remove('printer-vibrating');
                                if (printerLed) { printerLed.classList.remove('led-printing'); printerLed.classList.add('led-pulse'); }
                            }, 6000);
                        }, 300);
                    }
                } else {
                    // Stop printer if navigating away
                    if (printerSfx) printerSfx.pause();
                }

                window.scrollTo({ top: 0, behavior: 'instant' });
            };

            // ── AUDIO (Global instance used for early buffering) ──────────
            let currentIndex = 0;
            let lyricsTicker;

            function typeLyrics(text) {
                const el = document.getElementById('song-lyrics');
                if (!el) return;

                clearTimeout(lyricsTicker);
                el.textContent = '';
                let i = 0;

                function type() {
                    if (i < text.length) {
                        el.textContent += text.charAt(i);
                        i++;
                        lyricsTicker = setTimeout(type, 40);
                    }
                }
                type();
            }

            function loadSong(index) {
                currentIndex = ((index % songs.length) + songs.length) % songs.length;
                const song = songs[currentIndex];

                // Map the section title if provided
                if (DATA.musicSectionTitle) {
                    const sectTitle = document.getElementById('section-title');
                    if (sectTitle) sectTitle.textContent = DATA.musicSectionTitle;
                }

                if (!song) return;
                document.getElementById('music-cover').src = song.coverSrc || '';
                document.getElementById('song-title').textContent = song.songTitle || '—';
                document.getElementById('artist-name').textContent = song.artist || '—';

                // Typewriter effect for lyrics
                typeLyrics(song.lyrics || '♪ ♪ ♪');

                // Only load if different to avoid restarting early buffer
                if (audio.src !== new URL(song.audioSrc, window.location.href).href) {
                  audio.src = song.audioSrc;
                  audio.load();
                }
                updateDots();
            }

            function setMusicPlaying(playing) {
                const btn = document.getElementById('play-btn');
                const icon = document.getElementById('play-icon');
                const viz = document.getElementById('visualizer');
                if (!btn) return;
                btn.classList.toggle('paused', !playing);
                icon.textContent = playing ? 'pause' : 'play_arrow';
                icon.style.marginLeft = playing ? '0' : '2px';
                viz.classList.toggle('active', playing);
            }

            function buildDots() {
                const dotsEl = document.getElementById('song-dots');
                dotsEl.innerHTML = '';
                songs.forEach((_, i) => {
                    const dot = document.createElement('div');
                    dot.className = 'song-dot' + (i === currentIndex ? ' active' : '');
                    dot.addEventListener('click', () => {
                        loadSong(i);
                        audio.play().then(() => setMusicPlaying(true)).catch(() => { });
                    });
                    dotsEl.appendChild(dot);
                });
            }

            function updateDots() {
                document.querySelectorAll('.song-dot').forEach((d, i) =>
                    d.classList.toggle('active', i === currentIndex)
                );
            }

            // ── Init Music ───────────────────────────────────────────
            (function initMusic() {
                if (!document.getElementById('page-music')) return;
                if (DATA.musicSectionTitle) document.getElementById('section-title').textContent = DATA.musicSectionTitle;
                if (!songs.length) {
                    document.getElementById('song-title').textContent = 'Tidak ada lagu';
                    return;
                }
                buildDots();
                loadSong(0);

                document.getElementById('play-btn').addEventListener('click', () => {
                    if (audio.paused) {
                        audio.play().then(() => setMusicPlaying(true)).catch(() => { });
                    } else {
                        audio.pause();
                        setMusicPlaying(false);
                    }
                });

                document.getElementById('prev-btn').addEventListener('click', () => {
                    loadSong(currentIndex - 1);
                    audio.play().then(() => setMusicPlaying(true)).catch(() => { });
                });
                document.getElementById('next-btn').addEventListener('click', () => {
                    loadSong(currentIndex + 1);
                    audio.play().then(() => setMusicPlaying(true)).catch(() => { });
                });

                audio.addEventListener('ended', () => {
                    loadSong(currentIndex + 1);
                    audio.play().then(() => setMusicPlaying(true)).catch(() => { });
                });

                audio.addEventListener('timeupdate', () => {
                    if (!audio.duration) return;
                    document.getElementById('progress-bar').style.width = (audio.currentTime / audio.duration * 100) + '%';
                });
                audio.addEventListener('play', () => setMusicPlaying(true));
                audio.addEventListener('pause', () => setMusicPlaying(false));

                audio.addEventListener('waiting', () => {
                    const btn = document.getElementById('play-btn');
                    if (btn) btn.classList.add('is-loading');
                });
                audio.addEventListener('playing', () => {
                    const btn = document.getElementById('play-btn');
                    if (btn) btn.classList.remove('is-loading');
                });
                audio.addEventListener('canplay', () => {
                    const btn = document.getElementById('play-btn');
                    if (btn) btn.classList.remove('is-loading');
                });
                audio.addEventListener('error', () => {
                    const btn = document.getElementById('play-btn');
                    if (btn) btn.classList.remove('is-loading');
                });

                document.getElementById('progress-touch').addEventListener('click', (e) => {
                    const rect = e.currentTarget.getBoundingClientRect();
                    if (audio.duration) audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
                });

                document.getElementById('volume-slider').addEventListener('input', (e) => {
                    audio.volume = parseFloat(e.target.value);
                });
            })();

            // ── Init Gallery ─────────────────────────────────────────
            (function initGallery() {
                if (!document.getElementById('page-gallery')) return;
                const gallery = DATA.gallery || {};
                document.getElementById('gallery-title').textContent = gallery.title || 'Galleries Memories';
                document.getElementById('gallery-subtitle').textContent = gallery.subtitle || 'Scratch untuk reveal';

                function spawnGlitter(x, y) {
                    for (let i = 0; i < 8; i++) {
                        const g = document.createElement('div');
                        const tx = (Math.random() - 0.5) * 90;
                        const ty = -(Math.random() * 60 + 20);
                        g.style.cssText = `
                        position:fixed; width:6px; height:6px; border-radius:50%;
                        background:hsl(${Math.random() * 40 + 320},80%,70%);
                        left:${x}px; top:${y}px;
                        z-index:999; pointer-events:none;
                        --tx:${tx}px; --ty:${ty}px;
                        animation:glitter-fall 0.9s ease-out forwards;
                    `;
                        document.body.appendChild(g);
                        setTimeout(() => g.remove(), 1000);
                    }
                }

                function showModal(note) {
                    document.getElementById('modal-note').textContent = note;
                    document.getElementById('modal-overlay').classList.add('show');
                }

                function createPolaroid(memory, index) {
                    const frame = document.createElement('div');
                    frame.className = 'polaroid fade-in delay-' + Math.min(index + 1, 4);

                    if (memory.rotation !== undefined) {
                        frame.style.transform = `rotate(${memory.rotation}deg)`;
                    } else {
                        frame.style.transform = `rotate(${(Math.random() - 0.5) * 6}deg)`;
                    }
                    // Modal popup capability removed as requested.

                    const tape = document.createElement('div');
                    tape.className = 'polaroid-tape-el ' + (memory.tape || 'washi-tape');
                    frame.appendChild(tape);

                    // Scratch Wrapper
                    const sw = document.createElement('div');
                    sw.className = 'scratch-wrapper';

                    const mediaSrc = memory.url || memory.src || '';
                    const isVideo = mediaSrc.match(/\.(mp4|webm|ogg|mov|qt)(\?|$)/i) ||
                        (memory.type === 'video');
                    const img = document.createElement(isVideo ? 'video' : 'img');
                    img.className = 'scratch-image';
                    img.src = mediaSrc;
                    if (isVideo) {
                        // Set as proper HTML attributes (required for mobile Safari/Chrome autoplay)
                        img.setAttribute('autoplay', '');
                        img.setAttribute('loop', '');
                        img.setAttribute('muted', '');
                        img.setAttribute('playsinline', '');
                        img.setAttribute('preload', 'auto');
                        img.muted = true; // Also set via JS property (iOS Safari requires both)
                        img.loop = true;
                        img.playsInline = true;
                    } else {
                        img.alt = memory.caption || '';
                        img.referrerPolicy = 'no-referrer';
                    }
                    sw.appendChild(img);

                    // Scratch Canvas
                    const canvas = document.createElement('canvas');
                    canvas.className = 'scratch-layer scratch-canvas';
                    canvas.style.position = 'absolute';
                    canvas.style.inset = '0';
                    canvas.style.width = '100%';
                    canvas.style.height = '100%';
                    canvas.style.zIndex = '2';
                    canvas.style.cursor = 'pointer';
                    canvas.style.transition = 'opacity 0.8s ease';

                    // Intrinsic size for drawing
                    canvas.width = 300;
                    canvas.height = 300;

                    const ctx = canvas.getContext('2d', { willReadFrequently: true });
                    ctx.fillStyle = '#cbd5e1';
                    ctx.fillRect(0, 0, 300, 300);

                    ctx.font = 'bold 24px sans-serif';
                    ctx.fillStyle = '#64748b';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('Scratch Me!', 150, 150);

                    sw.appendChild(canvas);

                    let isDrawing = false;
                    let revealed = false;

                    function getMousePos(e) {
                        const rect = canvas.getBoundingClientRect();
                        if (e.touches && e.touches.length > 0) {
                            return { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
                        }
                        return { x: e.clientX - rect.left, y: e.clientY - rect.top };
                    }

                    function scratchStart(e) {
                        if (revealed) return;

                        // WAKING UP VIDEO ON FIRST TOUCH
                        // Mobile browsers require media playback to be initiated directly by a user gesture.
                        // Doing this on 'touchstart' or 'mousedown' guarantees it won't be blocked.
                        if (isVideo && img.tagName === 'VIDEO' && img.paused) {
                            img.muted = true;
                            const p = img.play();
                            if (p !== undefined) {
                                p.catch(() => { img.controls = true; });
                            }
                        }

                        if (scratchSfx) {
                            scratchSfx.volume = 0.5;
                            scratchSfx.play().catch(() => {});
                        }

                        isDrawing = true;
                        scratch(e);
                    }

                    function scratchEnd() {
                        isDrawing = false;
                        if (scratchSfx) scratchSfx.pause();
                        checkReveal();
                    }

                    function scratch(e) {
                        if (!isDrawing || revealed) return;
                        if (e.cancelable) e.preventDefault();

                        const pos = getMousePos(e);
                        const rect = canvas.getBoundingClientRect();
                        if (rect.width === 0) return; // Not visible yet

                        const rw = canvas.width / rect.width;
                        const rh = canvas.height / rect.height;
                        const tx = pos.x * rw;
                        const ty = pos.y * rh;

                        ctx.globalCompositeOperation = 'destination-out';
                        ctx.beginPath();
                        ctx.arc(tx, ty, 35, 0, Math.PI * 2);
                        ctx.fill();
                    }

                    function checkReveal() {
                        if (revealed) return;
                        const imageData = ctx.getImageData(0, 0, 300, 300);
                        let transparentPixels = 0;
                        for (let i = 3; i < imageData.data.length; i += 4) {
                            if (imageData.data[i] < 128) transparentPixels++;
                        }
                        if (transparentPixels / (300 * 300) > 0.45) { // 45% scratched
                            revealed = true;
                            canvas.classList.add('revealed');
                            const rect = canvas.getBoundingClientRect();
                            spawnGlitter(rect.left + rect.width / 2, rect.top + rect.height / 2);

                            // Explicitly play video on reveal — the scratch gesture counts as user interaction
                            // This is required for mobile browsers (iOS Safari, Android Chrome)
                            if (isVideo && img.tagName === 'VIDEO') {
                                img.muted = true;
                                const playPromise = img.play();
                                if (playPromise !== undefined) {
                                    playPromise.catch(() => {
                                        // If still blocked, show video controls as fallback
                                        img.controls = true;
                                    });
                                }
                            }

                            // Show caption when revealed
                            cap.style.opacity = '1';
                            cap.style.transform = 'rotate(-1.5deg) translateY(0)';
                        }
                    }

                    canvas.addEventListener('mousedown', scratchStart);
                    canvas.addEventListener('mousemove', scratch);
                    window.addEventListener('mouseup', scratchEnd);

                    canvas.addEventListener('touchstart', scratchStart, { passive: false });
                    canvas.addEventListener('touchmove', scratch, { passive: false });
                    window.addEventListener('touchend', scratchEnd);

                    frame.appendChild(sw);

                    const cap = document.createElement('span');
                    cap.className = 'polaroid-caption-text';
                    cap.textContent = memory.caption || '';

                    // Hide initially for a surprise effect
                    cap.style.opacity = '0';
                    cap.style.transform = 'rotate(-1.5deg) translateY(10px)';
                    cap.style.transition = 'all 1s ease 0.3s';

                    frame.appendChild(cap);
                    // Date display removed as requested.

                    return frame;
                }

                const grid = document.getElementById('gallery-grid');
                (gallery.memories || []).forEach((mem, i) => grid.appendChild(createPolaroid(mem, i)));

                const overlay = document.getElementById('modal-overlay');
                document.getElementById('modal-close').addEventListener('click', () => overlay.classList.remove('show'));
                overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.classList.remove('show'); });
            })();

            // ── Init Wrapped ─────────────────────────────────────────
            (function initWrapped() {
                if (!document.getElementById('page-wrapped')) return;
                const wrapped = DATA.wrapped || {};

                document.getElementById('top-places-label').textContent = wrapped.topPlacesLabel || 'Top Places';
                document.getElementById('core-memories-label').textContent = wrapped.coreMemoriesLabel || 'Core Memories';
                document.getElementById('minutes-together-label').textContent = wrapped.HoursTogetherLabel || 'Minutes Together';
                document.getElementById('vibe-label').textContent = wrapped.vibeLabel || 'Our Vibe';

                document.getElementById('minutes-together').textContent = wrapped.HoursTogether || '';
                document.getElementById('vibe-text').textContent = wrapped.vibe || '';

                const wrappedImg = document.getElementById('wrapped-image');
                if (wrappedImg) {
                    wrappedImg.src = wrapped.imageSrc || 'https://images.unsplash.com/photo-1516589178581-6cd7833ae3b2';
                    wrappedImg.onerror = function () {
                        this.src = "https://images.unsplash.com/photo-1516589178581-6cd7833ae3b2?q=80&w=400&auto=format&fit=crop";
                    }
                }

                const topPlacesList = document.getElementById('top-places-list');
                if (topPlacesList && Array.isArray(wrapped.topPlaces)) {
                    topPlacesList.innerHTML = wrapped.topPlaces.map(place => `<li>${place}</li>`).join('');
                }

                const coreMemoriesList = document.getElementById('core-memories-list');
                if (coreMemoriesList && Array.isArray(wrapped.coreMemories)) {
                    coreMemoriesList.innerHTML = wrapped.coreMemories.map(mem => `<li>${mem}</li>`).join('');
                }

                // ── Camera Button Logic ──────────────────────────────
                const camBtn = document.getElementById('wrapped-download-btn');
                if (camBtn) {
                    // Desktop Hover
                    camBtn.addEventListener('mouseenter', () => {
                        camBtn.style.transform = 'scale(1.12)';
                        camBtn.style.boxShadow = '0 6px 22px rgba(126,12,35,0.22)';
                    });
                    camBtn.addEventListener('mouseleave', () => {
                        camBtn.style.transform = 'scale(1)';
                        camBtn.style.boxShadow = '0 4px 16px rgba(126,12,35,0.12)';
                    });

                    // Mobile Touch
                    camBtn.addEventListener('touchstart', () => {
                        camBtn.style.transform = 'scale(0.92)';
                    }, { passive: true });
                    camBtn.addEventListener('touchend', () => {
                        camBtn.style.transform = 'scale(1)';
                    }, { passive: true });

                    const doCapture = async () => {
                        const card = document.querySelector('#page-wrapped .story-card');
                        const imgEl = document.getElementById('wrapped-image');
                        if (!card) return;

                        camBtn.style.opacity = '0.5';
                        camBtn.style.pointerEvents = 'none';

                        // Load html2canvas if needed
                        if (typeof html2canvas === 'undefined') {
                            try {
                                await new Promise((resolve, reject) => {
                                    const s = document.createElement('script');
                                    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
                                    s.onload = resolve;
                                    s.onerror = reject;
                                    document.head.appendChild(s);
                                });
                            } catch (e) {
                                camBtn.style.opacity = '1';
                                camBtn.style.pointerEvents = 'auto';
                                return;
                            }
                        }

                        const originalSrc = imgEl ? imgEl.src : '';
                        const originalObjectFit = imgEl ? imgEl.style.objectFit : '';
                        let captureDataUrl = null;

                        // Proxy CDN image → draw manually with object-fit:cover math
                        // so html2canvas gets a same-origin data URL with correct cropping
                        if (imgEl && originalSrc && originalSrc.includes('arcade-assets.for-you-always.my.id')) {
                            try {
                                const cdnBase = 'https://arcade-assets.for-you-always.my.id/';
                                const key = originalSrc.replace(cdnBase, '');
                                const proxyUrl = `${LOVES_WORKER_URL}/files/${key}`;
                                const res = await fetch(proxyUrl);
                                if (res.ok) {
                                    const blob = await res.blob();
                                    const blobUrl = URL.createObjectURL(blob);

                                    // Load proxy image to get natural dimensions
                                    const proxyImg = new Image();
                                    await new Promise((resolve) => {
                                        proxyImg.onload = resolve;
                                        proxyImg.onerror = resolve; // continue even if error
                                        proxyImg.src = blobUrl;
                                    });

                                    // Get the rendered frame dimensions (the 1:1 box on screen)
                                    const frame = imgEl.closest('.photo-frame');
                                    const frameW = frame ? frame.offsetWidth : imgEl.offsetWidth;
                                    const frameH = frame ? frame.offsetHeight : imgEl.offsetHeight;
                                    const natW = proxyImg.naturalWidth || imgEl.naturalWidth;
                                    const natH = proxyImg.naturalHeight || imgEl.naturalHeight;

                                    // Replicate object-fit:cover math
                                    const scale = Math.max(frameW / natW, frameH / natH);
                                    const renderW = natW * scale;
                                    const renderH = natH * scale;
                                    const offsetX = (frameW - renderW) / 2;
                                    const offsetY = (frameH - renderH) / 2;

                                    // Draw onto a temp canvas with correct crop
                                    const tmpCanvas = document.createElement('canvas');
                                    tmpCanvas.width = frameW;
                                    tmpCanvas.height = frameH;
                                    const ctx = tmpCanvas.getContext('2d');
                                    ctx.drawImage(proxyImg, offsetX, offsetY, renderW, renderH);
                                    captureDataUrl = tmpCanvas.toDataURL('image/jpeg', 0.95);

                                    URL.revokeObjectURL(blobUrl);
                                }
                            } catch (e) {
                                console.warn('Image proxy/crop failed, proceeding without:', e);
                            }
                        }

                        // Temporarily swap img src to the pre-cropped data URL
                        // and set objectFit=fill so html2canvas doesn't re-crop
                        if (captureDataUrl && imgEl) {
                            imgEl.src = captureDataUrl;
                            imgEl.style.objectFit = 'fill';
                            await new Promise(r => setTimeout(r, 150));
                        }

                        try {
                            const canvas = await html2canvas(card, {
                                scale: 2,
                                useCORS: true,
                                allowTaint: true,
                                backgroundColor: null,
                                logging: false
                            });
                            const link = document.createElement('a');
                            link.download = 'my-memory.png';
                            link.href = canvas.toDataURL('image/png');
                            link.click();
                        } catch (e) {
                            console.error('Capture failed:', e);
                        } finally {
                            // Restore original image src and object-fit
                            if (imgEl && originalSrc) {
                                imgEl.src = originalSrc;
                                imgEl.style.objectFit = originalObjectFit;
                            }
                            camBtn.style.opacity = '1';
                            camBtn.style.pointerEvents = 'auto';
                        }
                    };

                    camBtn.addEventListener('click', doCapture);
                }
            })();

            // ── Init Surat ───────────────────────────────────────────
            (function initSurat() {
                if (!document.getElementById('page-surat')) return;
                const letter = DATA.letter || {};
                document.getElementById('letter-recipient').textContent = letter.recipient || 'Yang Tercinta';
                document.getElementById('letter-body').innerHTML = letter.message || '<p>Surat ini untukmu ❤️</p>';
                document.getElementById('letter-signature').textContent = letter.signature || 'Dengan Cinta';

                let opened = false;
                document.getElementById('envelope-wrapper').addEventListener('click', () => {
                    if (opened) return;
                    opened = true;
                    document.getElementById('envelope-wrapper').classList.add('open');
                    document.getElementById('tap-hint').style.opacity = '0';

                    setTimeout(() => {
                        document.getElementById('tap-hint').style.display = 'none';
                        const lc = document.getElementById('letter-content');
                        lc.classList.add('visible');
                        setTimeout(() => lc.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);

                        const bodyEl = document.getElementById('letter-body');
                        const sigEl = document.getElementById('letter-signature');
                        const htmlStr = letter.message || '<p>Surat ini untukmu ❤️</p>';
                        bodyEl.innerHTML = '';
                        let i = 0, isTag = false, currentHtml = '';

                        function type() {
                            if (i < htmlStr.length) {
                                let char = htmlStr.charAt(i);
                                currentHtml += char;
                                if (char === '<') isTag = true;
                                if (char === '>') isTag = false;
                                bodyEl.innerHTML = currentHtml + (isTag ? '' : '<span style="border-right: 2px solid rgba(126,12,35,0.4); animation: blink 1s step-end infinite;">&nbsp;</span>');
                                i++;
                                setTimeout(type, isTag ? 0 : 35);
                            } else {
                                bodyEl.innerHTML = currentHtml;
                                sigEl.style.transition = 'opacity 1.5s ease-in-out';
                                sigEl.style.opacity = '1';

                                // Tampilkan polaroid atau stamp jika ada di config data.js
                                if (letter.polaroidSrc || letter.stampSrc) {
                                    setTimeout(() => {
                                        const footer = document.querySelector('.letter-footer');
                                        if (letter.polaroidSrc && footer) {
                                            const polContainer = document.createElement('div');
                                            polContainer.style.cssText = 'margin-top: 2rem; padding: 10px; background: white; border-radius: 4px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transform: rotate(-2deg); display: inline-block; max-width: 200px; text-align: center; animation: fadeInUp 0.5s ease-out;';

                                            const img = document.createElement('img');
                                            img.src = letter.polaroidSrc;
                                            img.style.cssText = 'width: 100%; height: auto; border-radius: 2px;';
                                            polContainer.appendChild(img);

                                            if (letter.polaroidCaption) {
                                                const cap = document.createElement('p');
                                                cap.textContent = letter.polaroidCaption;
                                                cap.style.cssText = 'font-family: var(--font-dancing, "Dancing Script", cursive); margin-top: 8px; font-size: 1.1rem; color: #333;';
                                                polContainer.appendChild(cap);
                                            }
                                            footer.parentNode.appendChild(polContainer);
                                        }

                                        if (letter.stampSrc && footer) {
                                            const stamp = document.createElement('img');
                                            stamp.src = letter.stampSrc;
                                            stamp.style.cssText = 'position: absolute; right: 20px; top: 20px; width: 60px; opacity: 0.8; transform: rotate(15deg); animation: slap-in 0.4s cubic-bezier(0.2, 0.8, 0.2, 1.2) forwards;';
                                            footer.parentNode.appendChild(stamp);
                                        }
                                    }, 500);
                                }
                            }
                        }
                        setTimeout(type, 800);
                    }, 750);
                });
            })();

            // ── Init Invitation ──────────────────────────────────────
            (function initInvitation() {
                if (!document.getElementById('page-invitation')) return;
                const inv = DATA.invitation || {};

                document.getElementById('question-text').textContent = inv.question || 'Maukah kamu menjadi Valentineku?';

                    inv.bearReject2 || 'https://media.tenor.com/MN70fG-X1jcAAAAi/angry-dudu-dudu-kill.gif',

            // PostMessage listener for Studio Live Preview

                    const targetRoom = event.data.room;
                    if (targetRoom) {
                        navigateTo(targetRoom);
                    }
                }
            });

        } // end initializeValentineApp
