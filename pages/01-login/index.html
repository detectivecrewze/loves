    <section id="page-login" class="spa-page active">
        <div class="login-page" style="position:relative;z-index:2;">
            <div class="login-container">
                <div class="login-card fade-in delay-1">
                    <div class="icon-area" style="padding-top: 2rem; margin-bottom: -1.5rem;">
                        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1, 'wght' 200; font-size: 2.2rem; color: var(--primary); opacity: 0.9;">
                            diamond
                        </span>
                    </div>
                    <div>
                        <h1 class="login-title" id="login-title">Key to My Heart</h1>
                        <p class="login-instruction" style="font-family: var(--font-dancing); font-size: 1.15rem; opacity: 0.8;">Masukkan kata sandimu</p>
                    </div>
                    <div class="login-input-group" style="margin-top: 1.5rem;">
                        <input id="login-input" class="login-input" type="password"
                            placeholder="*kunci rahasia...*" autocomplete="off">
                        <span class="material-symbols-outlined lock-icon" id="lock-icon">lock_open</span>
                    </div>
                    <div class="btn-wrapper">
                        <div class="btn-glow"></div>
                        <button id="login-btn" class="login-btn" aria-label="Masuk">
                            <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1;font-size:1.5rem">favorite</span>
                        </button>
                    </div>
                    <p id="login-hint" style="font-size: 1.1rem; font-weight: 700; text-align: center; color: var(--primary); background: rgba(126,12,35,0.08); border: 1px solid rgba(126,12,35,0.2); border-radius: 0.5rem; padding: 0.4rem 1rem; margin-top: 1.25rem; display: none; font-family: var(--font-dancing); box-shadow: 0 4px 10px rgba(0,0,0,0.03);"></p>
                    <p class="login-error" id="login-error-msg"></p>
                </div>
            </div>
        </div>
    </section>
